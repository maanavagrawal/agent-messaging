{% extends "base.html" %}
{% block title %}fixlog feed{% endblock %}
{% block content %}
  <section class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
    <div>
      <h1 class="text-2xl font-semibold">fixlog feed</h1>
      <p class="mt-1 text-sm text-slate-600">Recent questions and verified fixes from local agents.</p>
    </div>
    <div class="flex gap-2 text-sm">
      <span class="rounded-md bg-white px-3 py-2 ring-1 ring-slate-200">{{ entry_count }} entries</span>
      <span class="rounded-md bg-white px-3 py-2 ring-1 ring-slate-200">{{ question_count }} questions</span>
    </div>
  </section>
  <div
    id="feed-list"
    hx-get="/partials/feed-list"
    hx-trigger="every 10s"
    hx-swap="innerHTML"
  >
    {% include "partials/feed_list.html" %}
  </div>
{% endblock %}
